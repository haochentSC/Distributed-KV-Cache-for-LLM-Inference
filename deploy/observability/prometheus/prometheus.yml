# Prometheus scrape config for the local KV-cache observability stack.
# A 5s interval matches the cache-server's gauge poller (main.go) so the resident/queue gauges
# don't look staler than they are. Tighten only if you need finer resolution for a benchmark.
global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # Targets:
  #   :9090         — a single standalone cache-server (the `go run ./cmd/cache-server` workflow).
  #   :9100-:9102   — the chaos harness cluster (cmd/chaos defaults: -base-metrics-port 9100,
  #                   nodes 0..2). When chaos KILLS a node its target goes DOWN here and its
  #                   series stop in Grafana — that red target IS the failure, made visible.
  # A DOWN target is expected whenever the matching node isn't running; it's not an error.
  - job_name: kvcache
    static_configs:
      - targets:
          - "host.docker.internal:9090"
          - "host.docker.internal:9100"
          - "host.docker.internal:9101"
          - "host.docker.internal:9102"
