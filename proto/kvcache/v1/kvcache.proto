syntax = "proto3";

package kvcache.v1;

option go_package = "github.com/haochentSC/distributed-kv-cache/gen/kvcache/v1;kvcachev1";

// KVCache stores serialized attention KV tensors keyed by an opaque 32-byte block
// hash. The hash is computed client-side (chained SHA-256 over token IDs, ADR 0011);
// the server treats it as opaque (ADR 0010). See docs/01-architecture.md.
service KVCache {
  // Lookup reports per-block presence (metadata only, NO tensor bytes). Phase 1
  // sends one block hash; block_hashes is repeated so longest-prefix lookups are a
  // non-breaking extension. The CLIENT assembles the longest contiguous run of
  // present blocks starting at index 0 (ADR 0011).
  rpc Lookup(LookupRequest) returns (LookupResponse);

  // Fetch server-streams one block's KV tensor bytes in bounded chunks (ADR 0012).
  rpc Fetch(FetchRequest) returns (stream KVChunk);

  // BatchFetch server-streams MANY blocks' KV bytes over ONE call, so a multi-block
  // prefix load pays a single round-trip instead of one per block (the load path is
  // latency-bound on the per-block RTT, not bandwidth — Phase 4.5 finding). The request
  // lists blocks in load order; every response frame carries the block's `index` so the
  // client demuxes. The server streams blocks in order (no interleave), but the index
  // makes the client robust regardless. A missing/mismatched block is reported with a
  // single terminal frame (found=false, last=true, no data) so one absent block never
  // fails the whole batch — the client just recomputes that block (ADR 0013/0016).
  rpc BatchFetch(BatchFetchRequest) returns (stream BatchKVChunk);

  // Write client-streams one block. The FIRST message MUST be a WriteHeader; the
  // rest are KVChunk data frames (ADR 0012). The receiving shard is the PRIMARY for
  // this block (the ring owner); it assigns the version and asynchronously forwards
  // the block to its replica via Replicate (Phase 3 Sub-stage B, ADR 0021).
  rpc Write(stream WriteChunk) returns (WriteResponse);

  // Replicate is the PRIMARY->REPLICA copy path (Sub-stage B). Same wire shape as
  // Write (a WriteHeader then KVChunk frames), with two differences in meaning:
  //   - The header's `version` field is AUTHORITATIVE: the replica stores the block
  //     under the primary's assigned version, it does NOT mint its own (so primary
  //     and replica versions never diverge).
  //   - The replica stores locally and MUST NOT re-forward — this is what prevents a
  //     replication loop (each node forwarding to its own replica forever).
  // Cache data is eventually consistent (ADR 0013), so this is fire-and-forget from
  // the primary's side: the client was already acked before this ran.
  rpc Replicate(stream WriteChunk) returns (WriteResponse);

  // Evict removes a block from the cache.
  rpc Evict(EvictRequest) returns (EvictResponse);

  // Health is a liveness/readiness probe.
  rpc Health(HealthRequest) returns (HealthResponse);
}

message LookupRequest {
  string model_id = 1;             // KV cache is model-specific
  repeated bytes block_hashes = 2; // 32-byte opaque hashes, in prefix order
}

message LookupResponse {
  repeated BlockPresence blocks = 1; // parallel to LookupRequest.block_hashes
}

message BlockPresence {
  bool has_entry = 1;
  uint64 version = 2;
  uint64 size_bytes = 3;
}

message FetchRequest {
  string model_id = 1;
  bytes block_hash = 2;
  uint64 version = 3; // 0 = latest/any
  repeated int32 token_ids = 4; // optional hit verification / collision guard
}

message KVChunk {
  bytes data = 1;
  bool last = 2; // true on the final frame
}

message BatchFetchRequest {
  string model_id = 1;            // one model for the whole batch
  repeated FetchBlock blocks = 2; // in load order; a block's index is its position here
}

// FetchBlock is one block's lookup key inside a BatchFetchRequest — the same fields a
// single FetchRequest carries, minus model_id (shared by the batch).
message FetchBlock {
  bytes block_hash = 1;
  uint64 version = 2;           // 0 = latest/any
  repeated int32 token_ids = 3; // optional hit verification / collision guard (ADR 0016)
}

// BatchKVChunk is one frame of the BatchFetch response stream, tagged with the request
// block it belongs to. For a present block the server sends >=1 frames with found=true,
// the last carrying last=true. For an absent/mismatched block it sends ONE frame with
// found=false, last=true, data empty.
message BatchKVChunk {
  uint32 index = 1; // position in BatchFetchRequest.blocks this frame belongs to
  bytes data = 2;
  bool last = 3;    // true on the final frame for THIS block
  bool found = 4;   // false => block missing/mismatch (data empty); client recomputes it
}

message WriteChunk {
  oneof msg {
    WriteHeader header = 1;
    KVChunk chunk = 2;
  }
}

message WriteHeader {
  string model_id = 1;
  bytes block_hash = 2;
  repeated int32 token_ids = 3; // for hit verification / collision guard
  string tenant_id = 4;         // Phase 5 fairness
  double recompute_cost = 5;    // Phase 5 cost-aware eviction
  uint64 total_size = 6;        // total tensor bytes that will follow
  uint64 version = 7;           // Replicate path ONLY: the primary's assigned version
                                // the replica must store under. Ignored by Write (the
                                // primary mints the version there). 0 on the Write path.
  bytes routing_key = 8;        // the PROMPT ROOT (blocks[0].Hash) the client routed this
                                // prompt by (prefix-affinity, ADR 0014). The primary needs
                                // it to pick the SAME replica the client's read-failover
                                // will try — placement is by root, storage is by block_hash
                                // (ADR 0021). Empty => fall back to block_hash (single block).
}

message WriteResponse {
  uint64 version = 1;
  bool stored = 2;
}

message EvictRequest {
  string model_id = 1;
  bytes block_hash = 2;
}

message EvictResponse {
  bool evicted = 1;
}

message HealthRequest {}

message HealthResponse {
  bool ok = 1;
}
